<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | DeenWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      rel="shortcut icon"
      href="./assets/origlogo.png"
      type="image/x-icon"
    />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/loginstyle.css" />
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
    ></script>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
    ></script>
    <script defer src="./auth.js"></script>
  </head>
  <body>
    <div class="content">
      <!-- First Navbar -->
      <div
        class="container-fluid text-center p-2"
        style="
          background-image: url(./assets/white-marble-with-gray-texture-background.jpg);
          background-size: cover;
        "
      >
        <a
          href="https://wa.me/+2347063569494?text=Hi%20DeenWise.%20My%20Name%20is%20...."
          class="text-dark text-decoration-none me-3"
          >Contact Number</a
        >
        |
        <a
          href="mailto:sadiqadetola08@gmail.com"
          class="text-dark text-decoration-none ms-3"
          >Email Address</a
        >
      </div>

      <!-- Second Navbar  -->
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <div class="d-flex align-items-center">
            <img
              src="./assets/nobgoriglogo.png"
              alt="Logo"
              class="logome-2 me-2"
              style="max-width: 50px; margin-left: 5%"
            />
            <a class="navbar-brand" href="./index.html">DeenWise</a>
          </div>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
            style="border: none"
            class="dropdown"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
            class="dropdown-content"
          >
            <ul class="navbar-nav d-flex align-items-center gap-4">
              <li class="nav-item">
                <a class="nav-link" href="./aboutus.html" style="color: white"
                  >About Us</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./courses.html" style="color: white"
                  >Our Courses</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./pricing.html" style="color: white"
                  >Pricing</a
                >
              </li>

              <div class="dropdown">
                <button class="dropbtn">
                  <img
                    src="./assets/contactlogo.png"
                    alt="Login"
                    class="avatar"
                  />
                </button>
                <div class="dropdown-content">
                  <ul class="list-unstyled">
                    <li><a href="./login.html" class="signin">Sign in</a></li>
                    <li><a href="./signup.html" class="signup">Sign up</a></li>
                  </ul>
                </div>
              </div>
            </ul>
          </div>
        </div>
      </nav>

      <!-- Login Form -->
      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-6">
            <h2 id="greeting" class="text-center mb-4"></h2>
            <form id="loginform">
              <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  required
                />
              </div>
              <button
                type="submit"
                class="btn btn-primary w-100"
                onclick="authenticateUser(event)"
              >
                Sign In
              </button>
              <div class="d-flex justify-content-between mt-2 gap-3">
                <button
                  type="submit"
                  class="btn btn-primary w-50 mt-2 justify-content-center"
                  id="studentLoginBtn"
                  onclick="window.location.href='dashboards/student.html'"
                >
                  Student Dashboard Login
                </button>
                <button
                  type="submit"
                  class="btn btn-primary w-50 mt-2 justify-content-center"
                  id="teacherLoginBtn"
                  onclick="window.location.href='teacherdashboard.html'"
                >
                  Teacher Dashboard Login
                </button>
              </div>
            </form>
            <!-- The Bottom Part  -->
            <div class="text-center my-3">OR</div>
            <button class="btn btn-danger w-100" onclick="signInWithGoogle()">
              Continue with Google
            </button>
            <div id="bottom">
              <div class="text-center mt-2">
                <a href="./fpassword.html" class="text-dark" id="fgp"
                  >Forgot Password?</a
                >
              </div>
              <div class="text-center mt-2" id="sgp">
                <span
                  >New?
                  <a href="./signup.html" class="text-dark">Sign up!</a></span
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Footer -->
    <footer
      class="text-black text-center py-2"
      style="
        text-align: center;
        background-image: url(./assets/bggg.jpeg);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        width: 100%;
      "
      id="footer1"
    >
      <div
        class="DeenWisefooter text-center"
        style="display: flex; flex-direction: row; gap: 1px"
      >
        <p style="width: 50%; color: white">
          &copy; 2025
          <span class="downdeenwise"
            ><a href="./index.html" class="addw">DeenWise</a></span
          >. All rights reserved.
        </p>
        <p style="width: 50%; color: white">
          Payment Platforms:
          <img src="./assets/visa2.png" alt="Visa" class="payplatlogos" />
          <span>Visa</span>
          <img
            src="./assets/verve3.jpeg"
            alt="Verve"
            class="payplatlogos"
            id="vervelogo"
          />Verve
        </p>
      </div>
      <p style="color: whitesmoke; text-decoration: none">
        Powered By
        <a
          href="https://wa.me/+2347063569494"
          class="ourlink"
          style="color: whitesmoke; text-decoration: none; font-weight: bold"
          >ABC Solutions</a
        >
      </p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const greeting = document.getElementById("greeting");
        const hour = new Date().getHours();
        if (hour < 12) {
          greeting.innerText = "Assalam Alaikum! Good Morning";
        } else if (hour < 18) {
          greeting.innerText = "Assalam Alaikum! Good Afternoon";
        } else {
          greeting.innerText = "Assalam Alaikum! Good Evening";
        }
      });
    </script>
  </body>
</html>
