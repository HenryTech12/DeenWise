      <!-- Login Form -->
      <div class="container mx-auto px-4 py-8">
        <div
          class="max-w-md mx-auto bg-white rounded-lg shadow-md overflow-hidden p-6"
        >
          <button
            type="button"
            class="bg-blue-600 flex gap-2 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          
          >
            <i data-lucide="arrow-left" class="w-5 h-5 mt-1 text-white"></i>
            <span>Back to Home</span>
          </button>
          <h2
            id="greeting"
            class="text-2xl font-bold text-center mb-6 mt-3"
          ></h2>
          <form id="signupForm">
            <div class="mb-4">
              <label for="name" class="block text-gray-700 font-medium mb-2"
                >Name</label
              >
              <input
                type="text"
                id="name"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
              />
            </div>
            <div class="mb-4">
              <label for="email" class="block text-gray-700 font-medium mb-2"
                >Email address</label
              >
              <input
                type="email"
                id="email"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
              />
            </div>
            <div class="mb-6">
              <label for="password" class="block text-gray-700 font-medium mb-2"
                >Password</label
              >
              <input
                title="Confirm Password"
                type="password"
                id="password1"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
              />
            </div>
            <div class="mb-6">
              <label for="password" class="block text-gray-700 font-medium mb-2"
                >Confirm Password</label
              >
              <input
                title="Confirm Password"
                type="password"
                id="password2"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
              />
            </div>
            <button
              type="submit"
              class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              Sign Up
            </button>

            <div class="text-center my-4 relative">
              <hr class="my-4" />
              <span
                class="px-3 bg-white text-gray-500 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
                >OR</span
              >
            </div>

            <button
              type="button"
              id="googleSignIn"
              class="w-full bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500"
            >
              Continue with Google
            </button>
          </form>
        </div>
      </div>

            <img

    <!-- Scripts -->
    <script>
      // Firebase initialization
      const firebaseConfig = {
        // Firebase configuration goes here
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID",
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      // Mobile menu toggle
      document
        .getElementById("mobile-menu-button")
        .addEventListener("click", function () {
          document.getElementById("mobile-menu").classList.toggle("hidden");
        });

      // Dynamic greeting based on time of day
      document.addEventListener("DOMContentLoaded", function () {
        const greeting = document.getElementById("greeting");
        const hour = new Date().getHours();
        if (hour < 12) {
          greeting.innerText = "Assalam Alaikum! Good Morning";
        } else if (hour < 18) {
          greeting.innerText = "Assalam Alaikum! Good Afternoon";
        } else {
          greeting.innerText = "Assalam Alaikum! Good Evening";
        }
      });

      // Sign up with email and password
      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const name = document.getElementById("name").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          // Create user
          auth
            .createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
              // Update user profile with name
              return userCredential.user.updateProfile({
                displayName: name,
              });
            })
            .then(() => {
              // Redirect to dashboard or home page
              window.location.href = "./index.html";
            })
            .catch((error) => {
              alert("Error: " + error.message);
            });
        });
      //Check if passwords match
      if (password1 !== password2) {
        alert("❌ Passwords do not match.");
        return;
      }

      // Sign in with Google
      document
        .getElementById("googleSignIn")
        .addEventListener("click", function () {
          const provider = new firebase.auth.GoogleAuthProvider();
          auth
            .signInWithPopup(provider)
            .then(() => {
              // Redirect to dashboard or home page
              window.location.href = "./index.html";
            })
            .catch((error) => {
              alert("Error: " + error.message);
            });
        });
      lucide.createIcons();
      function back() {
        window.location.href = "./index.html";
      }
    </script>
