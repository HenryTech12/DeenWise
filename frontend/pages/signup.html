<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | DeenWise</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./loginstyle.css">
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
  <script defer src="./auth.js"></script>
</head>
<body>

  <!-- First Navbar -->
  <div class="container-fluid text-center p-2" style="background-image: url(./assets/white-marble-with-gray-texture-background.jpg); background-size: cover;">
    <a href="https://wa.me/+2347063569494?text=Hi%20DeenWise.%20My%20Name%20is%20...." class="text-dark text-decoration-none me-3">Contact Number</a> |
    <a href="mailto:sadiqadetola08@gmail.com" class="text-dark text-decoration-none ms-3">Email Address</a>
  </div>

  <!-- Second Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="./index.html">
        <img src="./assets/nobgoriglogo.png" alt="Logo" style="max-width: 50px;"> DeenWise
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link text-white" href="./pages/aboutus.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Our Courses</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Pricing</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" data-bs-toggle="dropdown">
              <img src="./assets/contactlogo.png" alt="Login" class="avatar">
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="./login.html">Sign in</a></li>
              <li><a class="dropdown-item" href="./signup.html">Sign up</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="container mt-5">
    <div class="row justify-content-center" id="bcontent">
      <div class="col-md-6">
        <h2 id="greeting" class="text-center mb-4">Assalam Alaikum!</h2>
        <form id="loginform">
        <div class="mb-3">
            <label for="email" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" required>
        </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100" onclick="authenticateUser(event)">Sign Up</button>

        <div class="text-center my-3">OR</div>
        <button class="btn btn-danger w-100" onclick="signInWithGoogle()">Continue with Google</button>
        </div>
    </form>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const greeting = document.getElementById("greeting");
      const hour = new Date().getHours();
      if (hour < 12) {
        greeting.innerText = "Assalam Alaikum! Good Morning";
      } else if (hour < 18) {
        greeting.innerText = "Assalam Alaikum! Good Afternoon";
      } else {
        greeting.innerText = "Assalam Alaikum! Good Evening";
      }
    });
  </script>
</body>
</html>
