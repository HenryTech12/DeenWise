      <div class="card p-4 shadow">

          <p class="text-center">Enter your email to reset your password.</p>

          <form id="forgotPasswordForm" th:action="@{/a}" th:object="${user}">

                  <label for="email" class="form-label">Email Address</label>
                  <input type="email" class="form-control" id="email" placeholder="Enter your email" required th:field="*{email}">
              </div>
              <button type="submit" class="btn btn-primary w-100">Reset Password</button>
          </form>

          <div class="text-center mt-3">
              <a th:href="@{/login}" class="text-decoration-none">Back to Login</a>
